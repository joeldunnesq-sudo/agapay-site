name: Production Smoke & Quality Check

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to run smoke tests against'
        required: true
        default: 'https://agapay.app'

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to match GitHub's latest runner environment

      - name: Install dependencies
        # Falls back to standard install if package-lock.json isn't tracked in git
        run: npm install

      - name: Run code validation
        run: npm run check

      - name: Run live smoke tests
        run: node scripts/smoke-live.mjs ${{ github.event.inputs.target_url }}
