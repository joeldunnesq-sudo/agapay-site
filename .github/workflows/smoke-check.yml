name: Production Quality & Local Smoke Check

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to run tests against (set to localhost for inner-loop testing)'
        required: true
        default: 'http://localhost:3000' # Matches standard Node/Vite/Next app ports

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm install
          npm install playwright

      - name: Install Playwright Chromium Dependencies
        run: npx playwright install chromium --with-deps

      - name: Run code validation
        run: npm run check
        continue-on-error: true

      - name: Build Application
        run: |
          # If your repo uses a build step before serving production style pages
          npm run build --if-present

      - name: Start Local Server
        run: |
          # Swap 'npm run start' or 'npm run dev' to whatever matches your package.json server start script
          npm run start & 
        env:
          PORT: 3000

      - name: Wait for Local Server Availability
        run: |
          echo "Waiting for local application server to wake up..."
          # Polls localhost until it returns a valid response layout
          timeout 30 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'

      - name: Run live smoke tests
        run: node scripts/smoke-live.mjs ${{ github.event.inputs.target_url }}
