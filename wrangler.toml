name = "agapay-site"
main = "src/worker.js"
compatibility_date = "2026-05-25"
compatibility_flags = ["nodejs_compat"]

[vars]
AGAPAY_FROM_EMAIL = "AGAPAY <onboarding@agapay.app>"
AGAPAY_REPLY_TO_EMAIL = "support@agapay.app"
AGAPAY_REGISTRATION_NOTIFY_EMAIL = "hello@agapay.app"
AGAPAY_APP_URL = "https://agapay.app"
AGAPAY_PUBLIC_URL = "https://agapay.app"
AGAPAY_ENVIRONMENT = "production"
ACCOUNTING_DATABASE_BINDINGS = '{"agapay-acct-production-4ab22bac06dca8b80e70":"ACCOUNTING_DB_ST_FIACRE","agapay-acct-production-e4601e1d985ec8dcb9fe":"ACCOUNTING_DB_PHASE_G_CANARY"}'
ACCOUNTING_CANARY_PARISH_ID = "agapay-phase-g-canary"
ACCOUNTING_ALERT_EMAIL = "joeldunnesq@gmail.com"
TURNSTILE_SITE_KEY = "0x4AAAAAADgGWu1JfBKOSH_g"
CAMPAIGN_ASSETS_URL = "https://pub-a8aecb95751f49ac9b078c3e3ed378b8.r2.dev"
AGAPAY_ENABLED_PRODUCTS = "give,learn,listen"
# --- Phase 3B feature flags (all default OFF/false; see src/lib/tax-codes.js,
# src/learn/billing.js, src/lib/commerce-readiness.js for what each gates) ---
SUBSCRIPTION_TAX_CODES_ENABLED = "false"
LEARN_PERSISTED_CUSTOMER_ENFORCED = "false"
PARISH_COMMERCE_READINESS_ENABLED = "false"
PARISH_COMMERCE_READINESS_ENFORCED_FOR_NEW = "false"
PARISH_COMMERCE_READINESS_ENFORCED_FOR_ALL = "false"
# --- Phase 3C: top-level exemption-workflow kill switches ---
TAX_EXEMPTION_WORKFLOW_ENABLED = "true"
TAX_EXEMPTION_DOCUMENT_UPLOAD_ENABLED = "true"
TAX_EXEMPTION_STRIPE_SYNC_ENABLED = "true"

[triggers]
crons = ["0 8 * * *", "0 14 * * 6"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = [
  "/**.html",
  "/design",
  "/images/design/*",
  "/learn",
  "/myagapay",
  "/myagapay/*",
  "/donor",
  "/donor/*",
  "/give",
  "/give/*",
  "/my-agapay",
  "/my-agapay/*",
  "/learn/dashboard",
  "/learn/dashboard/*",
  "/learn/planner",
  "/learn/formation",
  "/learn/books",
  "/learn/grades",
  "/learn/community",
  "/learn/reports",
  "/learn/print-center",
  "/learn/onboarding",
  "/learn/co-op",
  "/learn/odyssey",
  "/learn/odyssey/*",
  "/listen",
  "/listen/*"
]

[[kv_namespaces]]
binding = "AGAPAY_REGISTRATIONS"
id = "c0c630d2699a4d42a72db927c6341707"

[[d1_databases]]
binding = "AGAPAY_DB"
database_name = "agapay-production"
database_id = "24f514a6-6904-425b-a4c8-b3584b23c0be"

[[d1_databases]]
binding = "ACCOUNTING_DB_ST_FIACRE"
database_name = "agapay-acct-production-4ab22bac06dca8b80e70"
database_id = "7d3a6a59-f622-4303-9e84-e1074879d11d"

[[d1_databases]]
binding = "ACCOUNTING_DB_PHASE_G_CANARY"
database_name = "agapay-acct-production-e4601e1d985ec8dcb9fe"
database_id = "0b55d572-7dbc-4f6d-97a5-826841f4bbb8"

[[r2_buckets]]
binding = "CAMPAIGN_ASSETS"
bucket_name = "agapay-campaign-assets"

# Private bucket for sales-tax exemption documents. Unlike CAMPAIGN_ASSETS,
# this bucket must NEVER have a public r2.dev URL enabled -- all access goes
# through authenticated Worker routes (src/handlers/tax-exemption.js) that
# stream the object directly. Bucket created via
# `wrangler r2 bucket create agapay-tax-exemption-docs`. See
# docs/reports/tax-exemption-phase3-report-2026-07-05.md for the operational
# checklist (preview/local-dev bucket naming, etc.).
[[r2_buckets]]
binding = "TAX_EXEMPTION_DOCS"
bucket_name = "agapay-tax-exemption-docs"

# Private bucket for annual donor giving-statement PDFs. Same rules as
# TAX_EXEMPTION_DOCS above: no public r2.dev URL, ever -- these are donor
# financial documents. All access goes through authenticated Worker routes
# (src/handlers/giving-statements.js) that stream the object directly.
# Bucket created via `wrangler r2 bucket create agapay-giving-statements`.
[[r2_buckets]]
binding = "GIVING_STATEMENTS"
bucket_name = "agapay-giving-statements"

# Private bucket for Parish Directory person and household photos. Never
# enable public r2.dev access; delivery goes through authenticated Worker
# media routes that re-check directory ownership and privacy.
[[r2_buckets]]
binding = "DIRECTORY_MEDIA"
bucket_name = "agapay-directory-media"

# Private operational backups for per-parish accounting databases. Objects
# are written and restored only by the accounting backup runbook; never
# expose this bucket through r2.dev or an unauthenticated route.
[[r2_buckets]]
binding = "ACCOUNTING_BACKUPS"
bucket_name = "agapay-accounting-backups"

[browser]
binding = "BROWSER"
