<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | AGAPAY</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/style.css" />
  <script src="/admin/app.js" defer></script>
  <link rel="stylesheet" href="/styles/numbers.css" />
</head>
<body class="admin-login-simple">
  <main class="admin-auth-page">
    <section class="admin-auth-shell">
      <div class="admin-auth-intro">
        <a href="/" class="auth-home-link" aria-label="AGAPAY home">
          <img src="/mark.png" alt="" />
        </a>
        <div>
          <div class="eyebrow">Welcome back</div>
          <h1>Open your admin console.</h1>
          <p>Log in to review parish registrations, verify canonical standing, manage onboarding, and keep AGAPAY moving.</p>
        </div>
      </div>

      <form class="admin-auth-card" onsubmit="loginFromAdminPage(event)">
        <h2>Login</h2>
        <div class="form-group">
          <label class="form-label" for="adminToken">Password</label>
          <input id="adminToken" type="password" autocomplete="current-password" placeholder="Your admin password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="adminActor">Name (for audit log)</label>
          <input id="adminActor" type="text" autocomplete="name" placeholder="Admin name" />
        </div>
        <div class="admin-auth-actions">
          <button class="btn btn-gold" type="submit">Log in</button>
          <a class="btn btn-ghost" href="/">AGAPAY home</a>
        </div>
      </form>
    </section>
  </main>

  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
