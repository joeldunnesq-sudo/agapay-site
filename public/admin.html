<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgaPay Admin</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --deep: #0F2D1F;
      --forest: #2F5A39;
      --gold: #B8902F;
      --cream: #F6F1E8;
      --paper: #FFFDF9;
      --stone: #6F6A60;
      --muted: #9A9488;
      --ink: #171715;
      --line: rgba(111,106,96,0.22);
      --shadow: 0 18px 50px rgba(15,45,31,0.09);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      background:
        linear-gradient(180deg, rgba(15,45,31,0.05), transparent 260px),
        var(--cream);
      color: var(--ink);
    }
    header {
      background:
        radial-gradient(circle at 50% 0%, rgba(184,144,47,0.18), transparent 38%),
        var(--deep);
      color: var(--cream);
      padding: 1.4rem 1.25rem 2rem;
      border-bottom: 1px solid rgba(184,144,47,0.5);
    }
    .header-inner, main { max-width: 1180px; margin: 0 auto; }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.7rem;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      color: var(--cream);
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 500;
    }
    .brand img {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: rgba(246,241,232,0.08);
      border: 1px solid rgba(184,144,47,0.28);
    }
    .header-pill {
      border: 1px solid rgba(184,144,47,0.34);
      border-radius: 999px;
      padding: 0.45rem 0.75rem;
      color: rgba(246,241,232,0.78);
      font-size: 12px;
    }
    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      font-weight: 500;
      line-height: 1;
    }
    .subtitle { margin: 0.75rem 0 0; color: rgba(246,241,232,0.72); font-size: 14px; max-width: 560px; line-height: 1.65; }
    main { padding: 1.25rem 1.25rem 4rem; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.4fr) auto;
      gap: 0.75rem;
      align-items: end;
      margin: -2.8rem 0 1rem;
      background: var(--paper);
      border: 1px solid rgba(184,144,47,0.28);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: var(--shadow);
    }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(111,106,96,0.25);
      border-radius: 8px;
      background: white;
      padding: 0.78rem 0.85rem;
      color: var(--ink);
      font: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(184,144,47,0.75);
      box-shadow: 0 0 0 3px rgba(184,144,47,0.12);
    }
    textarea { resize: vertical; min-height: 90px; line-height: 1.55; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 0.78rem 1rem;
      background: var(--deep);
      color: var(--cream);
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15,45,31,0.12); }
    button.secondary { background: white; color: var(--deep); border: 1px solid var(--line); }
    button.gold { background: var(--gold); color: var(--deep); }
    button:disabled { opacity: 0.6; cursor: wait; }
    .status {
      min-height: 1.25rem;
      color: var(--forest);
      font-size: 13px;
      margin-bottom: 1rem;
      padding-left: 0.2rem;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .metric {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 10px 26px rgba(15,45,31,0.04);
    }
    .metric-value {
      font-family: var(--serif);
      font-size: 28px;
      color: var(--deep);
      line-height: 1;
    }
    .metric-label {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(310px, 0.88fr) minmax(0, 1.28fr);
      gap: 1rem;
      align-items: start;
    }
    .panel {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(15,45,31,0.06);
    }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.05rem;
      border-bottom: 1px solid var(--line);
      color: var(--deep);
      font-weight: 600;
      background: linear-gradient(180deg, #fff, #fffdf9);
    }
    .list { display: grid; }
    .item {
      border-bottom: 1px solid var(--line);
      padding: 1rem 1.05rem;
      cursor: pointer;
      background: white;
      transition: background 0.15s, border-color 0.15s;
    }
    .item:hover, .item.active { background: rgba(184,144,47,0.08); }
    .item.active { border-left: 4px solid var(--gold); padding-left: calc(1.05rem - 4px); }
    .item:last-child { border-bottom: 0; }
    .item-name { font-family: var(--serif); font-size: 21px; color: var(--deep); line-height: 1.15; }
    .item-meta { margin-top: 0.35rem; color: var(--stone); font-size: 12px; line-height: 1.5; }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.22rem 0.58rem;
      background: rgba(47,90,57,0.1);
      color: var(--forest);
      font-size: 11px;
      font-weight: 600;
      margin-top: 0.5rem;
      text-transform: capitalize;
    }
    .badge.pending { background: rgba(184,144,47,0.12); color: #7a5c17; }
    .badge.needs_more_info { background: rgba(111,106,96,0.13); color: var(--stone); }
    .badge.verified { background: rgba(47,90,57,0.12); color: var(--forest); }
    .badge.rejected { background: rgba(150,40,40,0.1); color: #8a2929; }
    .detail { padding: 1.1rem; }
    .empty { padding: 2.4rem; color: var(--stone); text-align: center; line-height: 1.6; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .field {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.82rem;
      background: var(--paper);
    }
    .key {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .value { overflow-wrap: anywhere; line-height: 1.45; color: var(--ink); }
    .full { grid-column: 1 / -1; }
    .actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.75rem;
      border-top: 1px solid var(--line);
      margin-top: 1rem;
      padding-top: 1rem;
      background: linear-gradient(180deg, transparent, rgba(246,241,232,0.32));
    }
    .admin-section {
      border-top: 1px solid var(--line);
      padding-top: 1rem;
      margin-top: 1rem;
    }
    .admin-section-title {
      font-family: var(--serif);
      color: var(--deep);
      font-size: 22px;
      margin-bottom: 0.75rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }
    .toggle-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
    }
    .check-card {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      padding: 0.8rem;
      color: var(--deep);
      font-weight: 600;
    }
    .check-card input { width: auto; }
    code {
      background: rgba(47,90,57,0.08);
      border: 1px solid rgba(47,90,57,0.16);
      border-radius: 6px;
      padding: 0.1rem 0.28rem;
      color: var(--deep);
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.65rem;
    }
    .quick-actions button {
      padding: 0.48rem 0.65rem;
      font-size: 12px;
      box-shadow: none;
    }
    .stripe-link-box {
      display: none;
      margin-top: 0.75rem;
      border: 1px solid rgba(184,144,47,0.28);
      border-radius: 10px;
      background: rgba(184,144,47,0.08);
      padding: 0.85rem;
    }
    .stripe-link-box.visible { display: block; }
    .stripe-link-box a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--deep);
      color: var(--cream);
      padding: 0.7rem 0.9rem;
      font-weight: 600;
      text-decoration: none;
    }
    .stripe-link-box p {
      margin: 0.55rem 0 0;
      color: var(--stone);
      font-size: 12px;
      line-height: 1.55;
    }
    .payment-status {
      min-height: 1.2rem;
      margin-top: 0.55rem;
      color: var(--forest);
      font-size: 12px;
      line-height: 1.5;
    }
    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(150px, 0.35fr);
      gap: 0.75rem;
      padding: 1rem 1.05rem;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    @media (max-width: 820px) {
      .toolbar, .layout, .grid, .metrics, .search-row, .form-grid, .toggle-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand-row">
        <div class="brand">
          <img src="/mark.png" alt="" />
          <span>AgaPay</span>
        </div>
        <div class="header-pill">Parish review console</div>
      </div>
      <h1>AgaPay Admin</h1>
      <p class="subtitle">Review parish registrations and canonical verification notes.</p>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div>
        <label for="adminToken">Admin token</label>
        <input id="adminToken" type="password" placeholder="Paste AGAPAY_ADMIN_TOKEN" autocomplete="current-password" />
      </div>
      <div>
        <label for="statusFilter">Status</label>
        <select id="statusFilter" onchange="renderFilteredList()">
          <option value="all">All statuses</option>
          <option value="pending">Pending</option>
          <option value="needs_more_info">Needs more info</option>
          <option value="verified">Verified</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <button id="loadBtn" onclick="loadRegistrations()">Load registrations</button>
    </div>

    <div class="status" id="status"></div>

    <div class="metrics">
      <div class="metric"><div class="metric-value" id="metricTotal">0</div><div class="metric-label">Total</div></div>
      <div class="metric"><div class="metric-value" id="metricPending">0</div><div class="metric-label">Pending</div></div>
      <div class="metric"><div class="metric-value" id="metricVerified">0</div><div class="metric-label">Verified</div></div>
      <div class="metric"><div class="metric-value" id="metricNeedsInfo">0</div><div class="metric-label">Needs info</div></div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-title">
          <span>Registrations</span>
          <button class="secondary" onclick="loadRegistrations()">Refresh</button>
        </div>
        <div class="search-row">
          <div>
            <label for="searchInput">Search</label>
            <input id="searchInput" type="search" placeholder="Parish, city, jurisdiction, email..." oninput="renderFilteredList()" />
          </div>
          <div>
            <label for="sortOrder">Sort</label>
            <select id="sortOrder" onchange="renderFilteredList()">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="name">Parish name</option>
            </select>
          </div>
        </div>
        <div class="list" id="registrationList">
          <div class="empty">Enter the admin token to load pending registrations.</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <span>Details</span>
          <span id="selectedReference"></span>
        </div>
        <div class="detail" id="detailPane">
          <div class="empty">Select a registration.</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    let selectedReference = '';
    let registrationsCache = [];

    function token() {
      return document.getElementById('adminToken').value.trim();
    }

    function setStatus(message) {
      document.getElementById('status').textContent = message || '';
    }

    function setPaymentStatus(message) {
      const paymentStatus = document.getElementById('paymentStatus');
      if (paymentStatus) paymentStatus.textContent = message || '';
      setStatus(message);
    }

    function authHeaders() {
      return {
        'Accept': 'application/json',
        'Authorization': 'Bearer ' + token()
      };
    }

    function field(label, value, className = '') {
      const safeValue = value || '-';
      return `<div class="field ${className}"><div class="key">${label}</div><div class="value">${safeValue}</div></div>`;
    }

    function jsonForTextarea(value, fallback) {
      return JSON.stringify(value && value.length ? value : fallback, null, 2);
    }

    async function loadRegistrations() {
      if (!token()) {
        setStatus('Paste your admin token first.');
        return;
      }

      const btn = document.getElementById('loadBtn');
      btn.disabled = true;
      setStatus('Loading registrations...');

      try {
        const response = await fetch('/api/admin/registrations', { headers: authHeaders() });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Unable to load registrations');

        registrationsCache = result.registrations || [];
        renderMetrics(registrationsCache);
        renderFilteredList();
        setStatus(`Loaded ${(result.registrations || []).length} registration(s).`);
      } catch (err) {
        setStatus(err.message);
      } finally {
        btn.disabled = false;
      }
    }

    function renderMetrics(registrations) {
      document.getElementById('metricTotal').textContent = registrations.length;
      document.getElementById('metricPending').textContent = registrations.filter(item => item.status === 'pending').length;
      document.getElementById('metricVerified').textContent = registrations.filter(item => item.status === 'verified').length;
      document.getElementById('metricNeedsInfo').textContent = registrations.filter(item => item.status === 'needs_more_info').length;
    }

    function renderFilteredList() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const sort = document.getElementById('sortOrder').value;

      let filtered = registrationsCache.filter((item) => {
        const haystack = [
          item.reference,
          item.parishName,
          item.communityType,
          item.jurisdiction,
          item.city,
          item.state,
          item.priestEmail,
          item.treasurerEmail,
          item.status
        ].join(' ').toLowerCase();
        const matchesQuery = !query || haystack.includes(query);
        const matchesStatus = status === 'all' || item.status === status;
        return matchesQuery && matchesStatus;
      });

      filtered = filtered.sort((a, b) => {
        if (sort === 'oldest') return String(a.receivedAt).localeCompare(String(b.receivedAt));
        if (sort === 'name') return String(a.parishName).localeCompare(String(b.parishName));
        return String(b.receivedAt).localeCompare(String(a.receivedAt));
      });

      renderList(filtered);
    }

    function renderList(registrations) {
      const list = document.getElementById('registrationList');
      if (!registrations.length) {
        list.innerHTML = '<div class="empty">No matching registrations found.</div>';
        return;
      }

      list.innerHTML = registrations.map((item) => `
        <div class="item ${item.reference === selectedReference ? 'active' : ''}" onclick="loadDetail('${item.reference}')">
          <div class="item-name">${item.parishName || item.reference}</div>
          <div class="item-meta">${item.communityType || 'Community'} / ${item.jurisdiction || 'Jurisdiction'} / ${item.city || ''}, ${item.state || ''}</div>
          <div class="item-meta">${item.priestEmail || ''}</div>
          <span class="badge ${item.status || 'pending'}">${item.status || 'pending'}</span>
          <div class="quick-actions">
            <button class="secondary" onclick="event.stopPropagation(); copyText('${item.priestEmail || ''}')">Copy priest email</button>
            <button class="secondary" onclick="event.stopPropagation(); copyText('${item.treasurerEmail || ''}')">Copy treasurer email</button>
          </div>
        </div>
      `).join('');
    }

    async function copyText(value) {
      if (!value) {
        setStatus('Nothing to copy.');
        return;
      }
      await navigator.clipboard.writeText(value);
      setStatus('Copied to clipboard.');
    }

    async function loadDetail(reference) {
      selectedReference = reference;
      document.getElementById('selectedReference').textContent = reference;
      setStatus('Loading details...');

      try {
        const response = await fetch('/api/admin/registrations/' + encodeURIComponent(reference), { headers: authHeaders() });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Unable to load registration');

        renderDetail(result.registration);
        setStatus('');
      } catch (err) {
        setStatus(err.message);
      }
    }

    function renderDetail(reg) {
      document.getElementById('detailPane').innerHTML = `
        <div class="grid">
          ${field('Status', reg.status)}
          ${field('Giving Status', reg.givingStatus)}
          ${field('Stripe Status', reg.stripeAccountStatus)}
          ${field('Stripe Account ID', reg.stripeAccountId)}
          ${field('Charges Enabled', reg.stripeChargesEnabled === undefined ? '' : String(reg.stripeChargesEnabled))}
          ${field('Payouts Enabled', reg.stripePayoutsEnabled === undefined ? '' : String(reg.stripePayoutsEnabled))}
          ${field('Stripe Disabled Reason', reg.stripeDisabledReason)}
          ${field('Stripe Requirements Due', Array.isArray(reg.stripeRequirementsDue) ? reg.stripeRequirementsDue.join(', ') : '', 'full')}
          ${field('Public Parish ID', reg.parishId)}
          ${field('Parish Dashboard Token', reg.parishDashboardToken ? 'Set' : 'Not set')}
          ${field('Received', reg.receivedAt)}
          ${field('Reviewed', reg.reviewedAt)}
          ${field('Community', reg.parishName)}
          ${field('Type', reg.communityType)}
          ${field('Jurisdiction', reg.jurisdiction, 'full')}
          ${field('Location', `${reg.city || ''}, ${reg.state || ''}`)}
          ${field('Website', reg.website)}
          ${field('Priest/Admin', `${reg.priestFirst || ''} ${reg.priestLast || ''}`)}
          ${field('Priest Email', reg.priestEmail)}
          ${field('Priest Phone', reg.priestPhone)}
          ${field('Treasurer', `${reg.treasurerFirst || ''} ${reg.treasurerLast || ''}`)}
          ${field('Treasurer Email', reg.treasurerEmail)}
          ${field('Diocese / Deanery', reg.dioceseOrDeanery)}
          ${field('Bishop / Authority', reg.bishopOrAuthority)}
          ${field('Verification Source', reg.verificationSource)}
          ${field('Reviewed By', reg.reviewedBy)}
          ${field('Notes', reg.notes, 'full')}
          ${field('Reviewer Notes', reg.reviewerNotes, 'full')}
        </div>
        ${reg.status === 'verified' && reg.parishId ? `
          <div class="field full">
            <div class="key">Public profile</div>
            <div class="value">
              This registration is included in <code>/api/parishes</code> as <strong>${reg.parishId}</strong> when giving status is active.
              <br><br>
              Public giving URL: <code>/give/form?parish=${reg.parishId}</code>
            </div>
          </div>
        ` : ''}
        <div class="actions">
          <div class="admin-section">
            <div class="admin-section-title">Review</div>
            <div class="form-grid">
              <div>
                <label for="statusSelect">Canonical review status</label>
                <select id="statusSelect">
                  <option value="pending" ${reg.status === 'pending' ? 'selected' : ''}>Pending</option>
                  <option value="needs_more_info" ${reg.status === 'needs_more_info' ? 'selected' : ''}>Needs more info</option>
                  <option value="verified" ${reg.status === 'verified' ? 'selected' : ''}>Verified</option>
                  <option value="rejected" ${reg.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                  <option value="cancelled" ${reg.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                </select>
              </div>
              <div>
                <label for="reviewedBy">Reviewed by</label>
                <input id="reviewedBy" value="${reg.reviewedBy || ''}" placeholder="Joel Dunn" />
              </div>
              <div>
                <label for="verificationSource">Verification source</label>
                <input id="verificationSource" value="${reg.verificationSource || ''}" placeholder="Diocesan directory, parish website, clergy confirmation" />
              </div>
              <div>
                <label for="bishopOrAuthority">Bishop / authority</label>
                <input id="bishopOrAuthority" value="${reg.bishopOrAuthority || ''}" placeholder="Bishop or diocesan authority" />
              </div>
              <div class="full">
                <label for="dioceseOrDeanery">Diocese / deanery</label>
                <input id="dioceseOrDeanery" value="${reg.dioceseOrDeanery || ''}" placeholder="Diocese, metropolis, deanery, or vicariate" />
              </div>
            </div>
          </div>

          <div class="admin-section">
            <div class="admin-section-title">Giving Page</div>
            <div class="form-grid">
              <div>
                <label for="givingStatus">Giving page status</label>
                <select id="givingStatus">
                  <option value="active" ${(reg.givingStatus || 'active') === 'active' ? 'selected' : ''}>Active</option>
                  <option value="paused" ${reg.givingStatus === 'paused' ? 'selected' : ''}>Paused</option>
                  <option value="hidden" ${reg.givingStatus === 'hidden' ? 'selected' : ''}>Hidden</option>
                  <option value="cancelled" ${reg.givingStatus === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                </select>
              </div>
              <div>
                <label for="platformFee">Platform fee setting</label>
                <input id="platformFee" value="${reg.platformFee || ''}" placeholder="e.g. donor-covered, 1.5%, monastery-free" />
              </div>
              <div>
                <label for="parishDashboardToken">Parish dashboard token</label>
                <input id="parishDashboardToken" value="${reg.parishDashboardToken || ''}" placeholder="Give this private token to the parish" />
              </div>
            </div>
            <div class="toggle-row" style="margin-top:0.75rem;">
              <label class="check-card"><input id="recurringGivingEnabled" type="checkbox" ${(reg.recurringGivingEnabled ?? true) ? 'checked' : ''} /> Recurring giving</label>
              <label class="check-card"><input id="candlesEnabled" type="checkbox" ${(reg.candlesEnabled ?? true) ? 'checked' : ''} /> Candles</label>
              <label class="check-card"><input id="commemorationsEnabled" type="checkbox" ${(reg.commemorationsEnabled ?? true) ? 'checked' : ''} /> Commemorations</label>
            </div>
            <div class="form-grid" style="margin-top:0.75rem;">
              <div>
                <label for="fundsJson">Funds JSON</label>
                <textarea id="fundsJson" spellcheck="false">${jsonForTextarea(reg.funds, [{ id: 'general', name: 'General Operating Fund', description: 'Utilities, supplies, ministries, and day-to-day parish needs.' }])}</textarea>
              </div>
              <div>
                <label for="campaignsJson">Campaigns JSON</label>
                <textarea id="campaignsJson" spellcheck="false">${jsonForTextarea(reg.campaigns, [{ id: 'alms', name: 'Alms Campaign', description: 'Parish-approved alms for a specific need.' }])}</textarea>
              </div>
            </div>
          </div>

          <div class="admin-section">
            <div class="admin-section-title">Payments</div>
            <div class="form-grid">
              <div>
                <label for="stripeAccountStatus">Stripe onboarding status</label>
                <select id="stripeAccountStatus">
                  <option value="not_started" ${(reg.stripeAccountStatus || 'not_started') === 'not_started' ? 'selected' : ''}>Not started</option>
                  <option value="invited" ${reg.stripeAccountStatus === 'invited' ? 'selected' : ''}>Invited</option>
                  <option value="onboarding" ${reg.stripeAccountStatus === 'onboarding' ? 'selected' : ''}>Onboarding</option>
                  <option value="charges_enabled" ${reg.stripeAccountStatus === 'charges_enabled' ? 'selected' : ''}>Charges enabled</option>
                  <option value="payouts_enabled" ${reg.stripeAccountStatus === 'payouts_enabled' ? 'selected' : ''}>Payouts enabled</option>
                  <option value="restricted" ${reg.stripeAccountStatus === 'restricted' ? 'selected' : ''}>Restricted</option>
                </select>
              </div>
              <div>
                <label for="stripeAccountId">Stripe account ID</label>
                <input id="stripeAccountId" value="${reg.stripeAccountId || ''}" placeholder="acct_..." />
              </div>
            </div>
            <div class="button-row" style="margin-top:0.75rem;">
              <button class="gold" onclick="startStripeOnboarding('${reg.reference}')">Create onboarding link</button>
              <button class="secondary" onclick="refreshStripeStatus('${reg.reference}')">Refresh Stripe status</button>
            </div>
            <div class="payment-status" id="paymentStatus"></div>
            <div class="stripe-link-box" id="stripeLinkBox">
              <a id="stripeOnboardingLink" href="#" target="_blank" rel="noopener">Open Stripe onboarding</a>
              <p id="stripeLinkHelp">Send this link to the parish treasurer if they should complete onboarding themselves.</p>
            </div>
            <p style="margin:0.65rem 0 0; color:var(--stone); font-size:12px; line-height:1.55;">
              Onboarding links are single-use. If a link expires or the parish returns later, create a fresh one.
            </p>
          </div>

          <div class="admin-section">
            <div class="admin-section-title">Internal Notes</div>
            <label for="reviewerNotes">Reviewer notes</label>
            <textarea id="reviewerNotes" placeholder="Internal notes for this registration">${reg.reviewerNotes || ''}</textarea>
          </div>
          <div class="button-row">
            <button class="gold" onclick="saveReview('${reg.reference}')">Save review</button>
            <button class="secondary" onclick="copyRegistrationSummary()">Copy summary</button>
          </div>
        </div>
      `;
    }

    function copyRegistrationSummary() {
      const fields = Array.from(document.querySelectorAll('#detailPane .field')).map((field) => {
        const key = field.querySelector('.key')?.textContent || '';
        const value = field.querySelector('.value')?.textContent.trim() || '';
        return `${key}: ${value}`;
      });
      navigator.clipboard.writeText(fields.join('\n'));
      setStatus('Registration summary copied.');
    }

    async function saveReview(reference) {
      setStatus('Saving review...');
      try {
        let funds = [];
        let campaigns = [];
        try {
          funds = JSON.parse(document.getElementById('fundsJson').value || '[]');
          campaigns = JSON.parse(document.getElementById('campaignsJson').value || '[]');
        } catch {
          setStatus('Funds or campaigns JSON is invalid.');
          return;
        }

        const response = await fetch('/api/admin/registrations/' + encodeURIComponent(reference), {
          method: 'PATCH',
          headers: {
            ...authHeaders(),
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            status: document.getElementById('statusSelect').value,
            givingStatus: document.getElementById('givingStatus').value,
            stripeAccountStatus: document.getElementById('stripeAccountStatus').value,
            stripeAccountId: document.getElementById('stripeAccountId').value,
            reviewedBy: document.getElementById('reviewedBy').value,
            verificationSource: document.getElementById('verificationSource').value,
            bishopOrAuthority: document.getElementById('bishopOrAuthority').value,
            dioceseOrDeanery: document.getElementById('dioceseOrDeanery').value,
            platformFee: document.getElementById('platformFee').value,
            recurringGivingEnabled: document.getElementById('recurringGivingEnabled').checked,
            candlesEnabled: document.getElementById('candlesEnabled').checked,
            commemorationsEnabled: document.getElementById('commemorationsEnabled').checked,
            funds,
            campaigns,
            parishDashboardToken: document.getElementById('parishDashboardToken').value,
            reviewerNotes: document.getElementById('reviewerNotes').value
          })
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || 'Unable to save review');

        renderDetail(result.registration);
        await loadRegistrations();
        if (result.registration.status === 'verified' && result.registration.parishId) {
          setStatus(`Review saved. ${result.registration.parishName} is now in /api/parishes as ${result.registration.parishId}.`);
          return;
        }
        setStatus('Review saved.');
      } catch (err) {
        setStatus(err.message);
      }
    }

    async function startStripeOnboarding(reference) {
      setPaymentStatus('Creating Stripe onboarding link...');
      try {
        const response = await fetch('/api/admin/registrations/' + encodeURIComponent(reference) + '/stripe-onboarding', {
          method: 'POST',
          headers: authHeaders()
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.detail || result.error || 'Unable to create Stripe onboarding link');

        renderDetail(result.registration);
        await loadRegistrations();
        const linkBox = document.getElementById('stripeLinkBox');
        const link = document.getElementById('stripeOnboardingLink');
        const help = document.getElementById('stripeLinkHelp');
        if (linkBox && link) {
          link.href = result.onboardingUrl;
          linkBox.classList.add('visible');
        }
        let copied = false;
        try {
          await navigator.clipboard.writeText(result.onboardingUrl);
          copied = true;
        } catch {
          copied = false;
        }
        const message = copied
          ? 'Stripe onboarding link created and copied. Click Open Stripe onboarding.'
          : 'Stripe onboarding link created. Click Open Stripe onboarding.';
        if (help) help.textContent = copied
          ? 'The link has also been copied to your clipboard. Send it to the parish treasurer if they should complete onboarding themselves.'
          : 'Clipboard access was blocked, but the link is ready here. Send it to the parish treasurer if they should complete onboarding themselves.';
        setPaymentStatus(message);
      } catch (err) {
        setPaymentStatus(err.message);
      }
    }

    async function refreshStripeStatus(reference) {
      setPaymentStatus('Refreshing Stripe status...');
      try {
        const response = await fetch('/api/admin/registrations/' + encodeURIComponent(reference) + '/stripe-refresh', {
          method: 'POST',
          headers: authHeaders()
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.detail || result.error || 'Unable to refresh Stripe status');

        renderDetail(result.registration);
        await loadRegistrations();
        setPaymentStatus(`Stripe status refreshed: ${result.registration.stripeAccountStatus || 'unknown'}.`);
      } catch (err) {
        setPaymentStatus(err.message);
      }
    }

    const stripeReturnReference = new URLSearchParams(window.location.search).get('stripe_return');
    if (stripeReturnReference) {
      setStatus(`Stripe onboarding returned for ${stripeReturnReference}. Paste your admin token, load registrations, then refresh Stripe status.`);
    }
  </script>
</body>
</html>
