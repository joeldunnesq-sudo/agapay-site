<!DOCTYPE html>
<html lang="en">
   <head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#061522">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >
  <meta
    name="apple-mobile-web-app-title"
    content="AGAPAY Listen"
  >

  <link
    rel="manifest"
    href="/listen/manifest.webmanifest?v=5"
  >

  <link
    rel="apple-touch-icon"
    sizes="192x192"
    href="/listen/images/app/icon-192.png?v=5"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="192x192"
    href="/listen/images/app/icon-192.png?v=5"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="512x512"
    href="/listen/images/app/icon-512.png?v=5"
  >

  <title>AGAPAY Listen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="/listen/listen-premium.css?v=5"
  >

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      color-scheme: dark;
      background: #061522;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      background: #061522;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    /* Full-screen app on phones */
    #listen-app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #061522;
      overflow: hidden;
    }

    /* Phone-frame preview on desktop */
    @media (min-width: 520px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        background: #0d1f2d;
      }

      #listen-app {
        position: relative;
        inset: auto;
        width: 390px;
        height: 844px;
        border-radius: 40px;
        box-shadow:
          0 0 0 1.5px rgba(200, 162, 74, 0.22),
          0 2px 0 rgba(255, 255, 255, 0.06) inset,
          0 50px 100px rgba(0, 0, 0, 0.7),
          0 10px 28px rgba(0, 0, 0, 0.4);
        overflow: hidden;
      }
    }

    .screen-content {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (min-width: 520px) {
      .screen-content {
        padding-top: 28px;
      }
    }

    /* Keep podcast artwork square */
    .album-art,
    .now-playing img,
    .art-container img,
    .agp-player-artwork img {
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 76px;
      height: calc(76px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(6, 21, 34, 0.97);
      border-top: 1px solid rgba(200, 162, 74, 0.12);
      z-index: 30;
    }

    @keyframes glow-pulse {
      0%,
      100% {
        box-shadow:
          0 0 32px rgba(200, 162, 74, 0.25),
          0 0 80px rgba(200, 162, 74, 0.1);
      }

      50% {
        box-shadow:
          0 0 48px rgba(200, 162, 74, 0.45),
          0 0 120px rgba(200, 162, 74, 0.2);
      }
    }

    .tappable {
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .tappable:active {
      opacity: 0.75;
    }

    input {
      color-scheme: dark;
    }

    input::placeholder {
      color: rgba(166, 159, 145, 0.6);
    }
  </style>
</head>
<body>

  <div id="listen-app">
    </div>

  <script type="module" src="/listen/app.js"></script>
  
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Point directly to a dedicated or shared script file explicitly scoped
        navigator.serviceWorker.register('/listen/sw.js', { scope: '/listen/' })
          .then(reg => console.log('AGAPAY Listen PWA registered with scope:', reg.scope))
          .catch(err => console.error('Service worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
