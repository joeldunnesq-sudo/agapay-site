<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#061522">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AGAPAY Listen">
  <meta name="description" content="Orthodox podcasts — sermons, theology, prayer, lives of the saints.">
  <title>AGAPAY Listen</title>
  <link rel="manifest" href="/learn/manifest.webmanifest">
  <link class="tappable" rel="apple-touch-icon" href="/images/app/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { display: none; }

    html, body {
      height: 100%;
      background: #061522;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* Full-screen on mobile, phone frame on desktop */
    #listen-app {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #061522;
      overflow: hidden;
    }

    @media (min-width: 520px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0d1f2d;
      }
      #listen-app {
        position: relative;
        width: 390px;
        height: 844px;
        border-radius: 40px;
        box-shadow:
          0 0 0 1.5px rgba(200,162,74,0.22),
          0 2px 0 rgba(255,255,255,0.06) inset,
          0 50px 100px rgba(0,0,0,0.7),
          0 10px 28px rgba(0,0,0,0.4);
        overflow: hidden;
      }
    }

    /* Safe area padding for real iPhones and clean desktop spacing */
    .screen-content {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-top: env(safe-area-inset-top, 24px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (min-width: 520px) {
      .screen-content { padding-top: 28px; }
    }

    /* Force Album Art / Now Playing Images to be Square instead of Rounded Circle */
    .album-art, 
    .now-playing img,
    [class*="album"], 
    [class*="artwork"] {
      border-radius: 8px !important; /* Forces sharp/subtly rounded corners instead of 50% / circle */
      aspect-ratio: 1 / 1 !important;
      object-fit: cover !important;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 76px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(6,21,34,0.97);
      border-top: 1px solid rgba(200,162,74,0.12);
      z-index: 30;
    }

    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 0 32px rgba(200,162,74,0.25), 0 0 80px rgba(200,162,74,0.1); }
      50%      { box-shadow: 0 0 48px rgba(200,162,74,0.45), 0 0 120px rgba(200,162,74,0.2); }
    }

    /* Tap feedback */
    .tappable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .tappable:active { opacity: 0.75; }

    input::placeholder { color: rgba(166,159,145,0.6); }
    input { color-scheme: dark; }
  </style>
</head>
<body>

  <div id="listen-app">
    </div>

  <script type="module" src="/listen/app.js"></script>

  <script>
    // Register service worker
   if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/listen/service-worker.js', { scope: '/listen/' })
        .then((registration) => {
          console.log('AGAPAY Listen PWA registered with scope:', registration.scope);
        })
        .catch((error) => {
          console.error('Listen PWA scoped registration failed:', error);
        });
    });
  }
  </script>
</body>
</html>
