<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#061522">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AGAPAY Listen">
  <meta name="description" content="Orthodox podcasts — sermons, theology, prayer, lives of the saints.">
  <title>AGAPAY Listen</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/images/app/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { display: none; }

    html, body {
      height: 100%;
      background: #061522;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* Full-screen on mobile, phone frame on desktop */
    #listen-app {
      width: 100%;
      height: 100%;
      position: fixed;
      inset: 0;
      background: #061522;
      overflow: hidden;
    }

    @media (min-width: 520px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0d1f2d;
      }
      #listen-app {
        position: relative;
        width: 390px;
        height: 844px;
        border-radius: 52px;
        box-shadow:
          0 0 0 1.5px rgba(200,162,74,0.22),
          0 2px 0 rgba(255,255,255,0.06) inset,
          0 50px 100px rgba(0,0,0,0.7),
          0 10px 28px rgba(0,0,0,0.4);
        overflow: hidden;
      }
    }

    /* Status bar sits behind dynamic island */
    .status-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 10px;
      z-index: 40;
      pointer-events: none;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 50;
      pointer-events: none;
    }

    /* Only show dynamic island on desktop frame */
    @media (max-width: 519px) {
      .dynamic-island { display: none; }
      .status-bar { display: none; }
    }

    /* Safe area padding for real iPhones */
    .screen-content {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-top: env(safe-area-inset-top, 52px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (min-width: 520px) {
      .screen-content { padding-top: 52px; }
    }

    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 76px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(6,21,34,0.97);
      border-top: 1px solid rgba(200,162,74,0.12);
      z-index: 30;
    }

    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 0 32px rgba(200,162,74,0.25), 0 0 80px rgba(200,162,74,0.1); }
      50%      { box-shadow: 0 0 48px rgba(200,162,74,0.45), 0 0 120px rgba(200,162,74,0.2); }
    }

    /* Tap feedback */
    .tappable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .tappable:active { opacity: 0.75; }

    input::placeholder { color: rgba(166,159,145,0.6); }
    input { color-scheme: dark; }
  </style>
</head>
<body>
  <div id="listen-app">
    <!-- Dynamic Island (desktop frame only) -->
    <div class="dynamic-island"></div>
    <!-- Status bar (desktop frame only) -->
    <div class="status-bar">
      <span style="font-size:13px;font-weight:600;color:#F6F1E8;letter-spacing:0.02em" id="status-time">9:41</span>
      <div style="display:flex;gap:6px;align-items:center">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#F6F1E8" opacity="0.35"/><rect x="5" y="5" width="3" height="7" rx="1" fill="#F6F1E8" opacity="0.6"/><rect x="10" y="2.5" width="3" height="9.5" rx="1" fill="#F6F1E8" opacity="0.85"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#F6F1E8"/></svg>
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 3c2.1 0 4 .9 5.4 2.3l1.5-1.5A9 9 0 008.5.5a9 9 0 00-6.4 2.8l1.5 1.5A6.4 6.4 0 018.5 3z" fill="#F6F1E8" opacity="0.55"/><path d="M8.5 6c1.3 0 2.5.5 3.4 1.4l1.5-1.5A6 6 0 008.5 4a6 6 0 00-4.4 1.9l1.5 1.5A3.6 3.6 0 018.5 6z" fill="#F6F1E8" opacity="0.8"/><circle cx="8.5" cy="10.5" r="1.5" fill="#F6F1E8"/></svg>
        <div style="width:23px;height:11px;border:1.5px solid rgba(246,241,232,0.65);border-radius:3px;padding:1.5px;position:relative">
          <div style="position:absolute;right:-4.5px;top:50%;transform:translateY(-50%);width:3px;height:6px;background:rgba(246,241,232,0.45);border-radius:0 2px 2px 0"></div>
          <div style="width:78%;height:100%;background:#F6F1E8;border-radius:1.5px"></div>
        </div>
      </div>
    </div>
    <!-- App mounts here -->
  </div>

  <script type="module" src="/listen/app.js"></script>

  <script>
    // Update status bar clock
    function updateClock() {
      const el = document.getElementById('status-time');
      if (!el) return;
      const now = new Date();
      el.textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    }
    updateClock();
    setInterval(updateClock, 30000);

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
