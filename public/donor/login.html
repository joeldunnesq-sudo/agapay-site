<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Login | AgaPay</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/donor/style.css" />
  <script src="/donor/app.js" defer></script>
</head>
<body class="donor-login-simple">
  <main class="donor-auth-page">
    <section class="donor-auth-shell">
      <div class="notice" id="donorStatus" style="display:none;"></div>

      <div class="donor-auth-intro">
        <img src="/mark.png" alt="" />
        <div>
          <div class="eyebrow">Welcome back</div>
          <h1>Open your donor dashboard.</h1>
          <p>Log in after verifying your email to view giving history, manage commemorations, and give through AgaPay.</p>
        </div>
      </div>

      <form class="donor-auth-card" onsubmit="loginFromPage(event)">
        <h2>Login</h2>
        <div class="form-group">
          <label class="form-label" for="donorEmail">Email</label>
          <input class="form-input" id="donorEmail" type="email" autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label" for="donorPassword">Password</label>
          <input class="form-input" id="donorPassword" type="password" autocomplete="current-password" placeholder="Your password" />
        </div>
        <div class="donor-auth-actions">
          <button class="btn btn-gold" type="submit">Log in</button>
          <a class="btn btn-ghost" href="/donor/signup">Sign up</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
