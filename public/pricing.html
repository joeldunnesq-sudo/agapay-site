<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing — AgaPay</title>
  <meta name="description" content="AgaPay pricing — free for monasteries, affordable for mission parishes, and built to scale with your community. Honest fees, nothing hidden." />
  <meta property="og:title" content="AgaPay Pricing" />
  <meta property="og:url" content="https://agapay.app/pricing" />
  <meta name="theme-color" content="#0F2D1F" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:    #0F2D1F;
      --forest: #355E3B;
      --gold:   #C8A24A;
      --cream:  #F3EFE6;
      --stone:  #A69F91;
      --ink:    #1A1A18;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;
      --r:      10px;
      --rlg:    16px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--cream); color: var(--ink); -webkit-font-smoothing: antialiased; }
    body.nav-open { overflow: hidden; }
    a { color: inherit; text-decoration: none; }

    /* FIXED BACKGROUND DECORATIONS */
    .candle-glow {
      position: fixed; 
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(200, 162, 74, 0.06) 0%, rgba(53, 94, 59, 0.02) 40%, transparent 70%);
      filter: blur(50px); pointer-events: none; z-index: -1; border-radius: 50%;
    }
    .candle-glow.top-left  { top: -150px; left: -150px; }
    .candle-glow.bottom-right { bottom: -150px; right: -150px; }

    h1, h2, h3 { letter-spacing: -0.02em !important; }

    /* NAV */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(243,239,230,0.93); backdrop-filter: blur(12px); border-bottom: 0.5px solid rgba(166,159,145,0.35); }
    .nav-inner { max-width: 1024px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .nav-logo { display: flex; align-items: center; gap: 5px; z-index: 110; }
    .nav-mark { width: 52px; height: 52px; background: var(--deep); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-name { font-family: var(--serif); font-size: 32px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
    .nav-name em { color: var(--gold); font-style: normal; }
    
    .nav-links { display: flex; align-items: center; gap: 1.25rem; }
    .nav-links a { font-size: 14px; color: var(--stone); transition: color 0.2s; }
    .nav-links a:hover { color: var(--ink); }
    .nav-cta { display: inline-block; background: var(--deep); color: var(--cream); border: none; padding: 9px 18px; border-radius: var(--r); font-size: 13px; font-family: var(--sans); font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .nav-cta:hover { background: var(--forest); }
    .nav-give { display: inline-block; background: var(--gold); color: var(--deep) !important; border: none; padding: 9px 18px; border-radius: var(--r); font-size: 13px; font-family: var(--sans); font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .nav-give:hover { opacity: 0.9; color: var(--deep) !important; }

    /* HAMBURGER */
    .menu-toggle {
      display: none; background: none; border: none; cursor: pointer; width: 44px; height: 44px; z-index: 110; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    }
    .menu-toggle span { display: block; width: 22px; height: 2px; background-color: var(--deep); border-radius: 2px; transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s; }
    .menu-toggle[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-toggle[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
    .menu-toggle[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-nav-drawer {
      position: fixed; top: 0; right: 0; bottom: 0; left: 0; background-color: var(--cream); z-index: 105; padding: 6rem 2rem 3rem; display: flex; flex-direction: column; gap: 2rem; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
    }
    .mobile-nav-drawer.active { opacity: 1; visibility: visible; transform: translateY(0); }
    .mobile-drawer-links { display: flex; flex-direction: column; gap: 1.5rem; }
    .mobile-drawer-links a { font-family: var(--serif); font-size: 24px; color: var(--deep); border-bottom: 0.5px solid rgba(166,159,145,0.15); padding-bottom: 0.75rem; }
    .mobile-drawer-actions { margin-top: auto; display: flex; flex-direction: column; gap: 1rem; }
    .mobile-drawer-actions .nav-cta, .mobile-drawer-actions .nav-give { text-align: center; padding: 14px; font-size: 15px; width: 100%; }

    /* HERO */
    .hero { background: var(--deep); padding: 6rem 1.5rem 5rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 700px; height: 300px; background: radial-gradient(ellipse at top, rgba(200,162,74,0.11) 0%, transparent 65%); pointer-events: none; }
    .hero-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; object-fit: contain; opacity: 0.08; pointer-events: none; z-index: 0; }
    .hero-inner { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }
    .hero-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); margin-bottom: 1.25rem; font-weight: 500; }
    .hero h1 { font-family: var(--serif); font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 500; color: var(--cream); line-height: 1.18; letter-spacing: -0.01em; margin-bottom: 1.5rem; }
    .hero h1 em { color: var(--gold); font-style: italic; }
    .hero-sub { font-size: 15px; color: var(--stone); line-height: 1.85; max-width: 480px; margin: 0 auto; }

    /* WRAP */
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

    /* SECTION */
    .section { padding: 5rem 0; position: relative; }
    .section.alt { background: white; }
    .section-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); margin-bottom: 0.6rem; font-weight: 500; }
    .section-title { font-family: var(--serif); font-size: clamp(1.7rem, 3vw, 2.2rem); font-weight: 500; color: var(--deep); line-height: 1.22; margin-bottom: 1rem; letter-spacing: -0.01em; }
    .section-lead { font-size: 15px; color: var(--stone); line-height: 1.9; max-width: 580px; margin-bottom: 3rem; }

    /* PRICING CARDS */
    .pricing-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 2rem; }
    .pcard { background: white; border: 0.5px solid rgba(166,159,145,0.4); border-radius: var(--rlg); padding: 2rem; display: flex; flex-direction: column; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .pcard:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(15,45,31,0.08); }
    .pcard.featured { border: 2px solid var(--forest); }
    .pcard.dark { background: var(--deep); border-color: transparent; }
    .pcard-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 1rem; letter-spacing: 0.03em; }
    .pcard-badge.green { background: rgba(53,94,59,0.12); color: var(--forest); border: 0.5px solid rgba(53,94,59,0.25); }
    .pcard-badge.gold { background: rgba(200,162,74,0.12); color: #8B6B1F; border: 0.5px solid rgba(200,162,74,0.3); }
    .pcard-badge.cream { background: rgba(243,239,230,0.12); color: var(--cream); border: 0.5px solid rgba(243,239,230,0.2); }
    .pcard h3 { font-family: var(--serif); font-size: 1.3rem; font-weight: 500; color: var(--deep); margin-bottom: 0.4rem; line-height: 1.2; }
    .pcard.dark h3 { color: var(--cream); }
    .pcard-price { font-family: var(--serif); font-size: 2.4rem; font-weight: 500; color: var(--deep); line-height: 1; margin: 0.75rem 0 0.25rem; }
    .pcard.dark .pcard-price { color: var(--cream); }
    .pcard-price span { font-size: 14px; color: var(--stone); font-family: var(--sans); font-weight: 400; }
    .pcard.dark .pcard-price span { color: rgba(166,159,145,0.7); }
    .pcard-sub { font-size: 12px; color: var(--stone); margin-bottom: 1.5rem; }
    .pcard.dark .pcard-sub { color: rgba(166,159,145,0.6); }
    .pcard-divider { border: none; border-top: 0.5px solid rgba(166,159,145,0.25); margin-bottom: 1.5rem; }
    .pcard.dark .pcard-divider { border-color: rgba(166,159,145,0.15); }
    .pcard-features { list-style: none; display: flex; flex-direction: column; gap: 9px; margin-bottom: 1.75rem; flex: 1; }
    .pcard-features li { font-size: 13px; color: var(--stone); display: flex; align-items: flex-start; gap: 8px; line-height: 1.55; }
    .pcard.dark .pcard-features li { color: rgba(166,159,145,0.75); }
    .pcard-features li::before { content: '✦'; color: var(--gold); font-size: 9px; margin-top: 3px; flex-shrink: 0; }
    .pcard-features li.highlight { color: var(--ink); font-weight: 500; }
    .pcard.dark .pcard-features li.highlight { color: var(--cream); }
    .pcard-btn { width: 100%; padding: 11px; border-radius: var(--r); font-size: 13px; font-weight: 500; font-family: var(--sans); cursor: pointer; transition: all 0.2s; text-align: center; display: block; }
    .pcard-btn.outline { background: transparent; border: 0.5px solid rgba(166,159,145,0.5); color: var(--deep); }
    .pcard-btn.outline:hover { background: var(--cream); }
    .pcard-btn.fill { background: var(--deep); border: none; color: var(--cream); }
    .pcard-btn.fill:hover { background: var(--forest); }
    .pcard-btn.gold { background: var(--gold); border: none; color: var(--deep); }
    .pcard-btn.gold:hover { opacity: 0.88; }

    /* PULLQUOTE */
    .pullquote { border-left: 2px solid var(--gold); padding: 0.75rem 0 0.75rem 1.75rem; margin: 2rem 0 3rem; }
    .pullquote p { font-family: var(--serif); font-size: clamp(1.2rem, 2vw, 1.5rem); font-style: italic; color: var(--deep); line-height: 1.65; font-weight: 400; }

    /* WHY LINK BAND */
    .why-band { background: rgba(200,162,74,0.08); border: 0.5px solid rgba(200,162,74,0.25); border-radius: var(--rlg); padding: 1.5rem 2rem; margin-bottom: 3rem; display: flex; align-items: center; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap; }
    .why-band p { font-size: 14px; color: var(--ink); line-height: 1.6; }
    .why-band p span { color: var(--stone); font-size: 13px; display: block; margin-top: 3px; }
    .why-band a { display: inline-block; background: var(--deep); color: var(--cream); padding: 10px 20px; border-radius: var(--r); font-size: 13px; font-weight: 500; font-family: var(--sans); white-space: nowrap; transition: background 0.2s; }
    .why-band a:hover { background: var(--forest); }

    /* CALCULATOR */
    .calc-interface { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; margin-top: 2rem; align-items: stretch; }
    .calc-inputs-card { background: white; border: 0.5px solid rgba(166,159,145,0.35); border-radius: var(--rlg); padding: 2.5rem 2rem; }
    .calc-outputs-card { background: var(--deep); border-radius: var(--rlg); padding: 2.5rem 2rem; color: var(--cream); display: flex; flex-direction: column; justify-content: space-between; }
    .slider-group { margin-bottom: 2rem; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .slider-header label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--stone); font-weight: 500; }
    .slider-value { font-family: var(--serif); font-size: 22px; color: var(--deep); font-weight: 600; }
    .range-slider { width: 100%; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: rgba(166,159,145,0.25); outline: none; }
    .range-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--gold); cursor: pointer; }
    .slider-range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--stone); margin-top: 0.5rem; }
    .output-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(243,239,230,0.6); }
    .output-amount { font-family: var(--serif); font-size: 20px; font-weight: 500; }
    .output-metric.total .output-amount { font-size: 38px; color: var(--cream); font-weight: 600; line-height: 1; }

    /* FAQ */
    .faqs { display: flex; flex-direction: column; }
    .faq { border-bottom: 0.5px solid rgba(166,159,145,0.25); }
    .faq:first-child { border-top: 0.5px solid rgba(166,159,145,0.25); }
    .faq-btn { width: 100%; background: none; border: none; text-align: left; padding: 1.5rem 0; cursor: pointer; }
    .faq-q { font-size: 15px; font-weight: 500; color: var(--deep); display: flex; justify-content: space-between; align-items: center; }
    .faq-a { font-size: 14px; color: var(--stone); line-height: 1.8; max-height: 0; overflow: hidden; transition: max-height 0.3s; }
    .faq.open .faq-a { max-height: 220px; padding-bottom: 1.5rem; }

    @media (max-width: 768px) {
      .menu-toggle { display: flex; }
      .nav-links a:not(.nav-cta):not(.nav-give) { display: none; }
      .nav-inner .nav-cta, .nav-inner .nav-give { display: none; }
      .calc-interface { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="candle-glow top-left" aria-hidden="true"></div>
  <div class="candle-glow bottom-right" aria-hidden="true"></div>

  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo" aria-label="AgaPay Home">
        <div class="nav-mark"><img src="/mark.png" alt="AgaPay" style="width: 48px; height: 48px; object-fit: contain;" /></div>
        <span class="nav-name">Aga<em>Pay</em></span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a><a href="/features">Features</a><a href="/pricing">Pricing</a><a href="/why">Why AgaPay?</a><a href="/about">About</a>
        <a href="/#waitlist" class="nav-cta">Register parish</a><a href="/give" class="nav-give">Give now</a>
      </div>
      <button class="menu-toggle" onclick="toggleMenu()" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="mobile-nav-drawer" id="mobileDrawer" aria-hidden="true">
    <div class="mobile-drawer-links">
      <a href="/" onclick="toggleMenu()">Home</a><a href="/features" onclick="toggleMenu()">Features</a><a href="/pricing" onclick="toggleMenu()">Pricing</a><a href="/why" onclick="toggleMenu()">Why AgaPay?</a><a href="/about" onclick="toggleMenu()">About</a>
    </div>
    <div class="mobile-drawer-actions">
      <a href="/#waitlist" class="nav-cta" onclick="toggleMenu()">Register parish</a><a href="/give" class="nav-give" onclick="toggleMenu()">Give now</a>
    </div>
  </div>

  <header class="hero">
    <img src="/mark.png" alt="" aria-hidden="true" class="hero-watermark" />
    <div class="hero-inner">
      <h1>Honest fees.<br><em>Nothing hidden.</em></h1>
    </div>
  </header>

  <main class="section">
    <div class="wrap">
      <div class="calc-interface">
        <div class="calc-inputs-card">
          <div class="slider-group">
            <div class="slider-header"><label>Monthly Volume</label><span id="volumeDisplay" class="slider-value">$10,000</span></div>
            <input type="range" id="volumeRange" min="2000" max="50000" step="1000" value="10000" class="range-slider">
          </div>
          <div class="slider-group">
            <div class="slider-header"><label>Fee Coverage</label><span id="coverageDisplay" class="slider-value">70%</span></div>
            <input type="range" id="coverageRange" min="0" max="100" step="5" value="70" class="range-slider">
          </div>
        </div>
        <div class="calc-outputs-card">
          <div class="output-metric"><span class="output-label">Platform Cuts</span><div class="output-amount" id="lossDisplay">-$330.00</div></div>
          <div class="output-metric highlight"><span class="output-label">Saved</span><div class="output-amount" id="savedDisplay">+$231.00</div></div>
          <div class="output-metric total"><span class="output-label">Parish Net</span><div class="output-amount" id="netDisplay">$9,901.00</div><span id="efficiencyDisplay">99% Yield</span></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function toggleMenu() {
      const drawer = document.getElementById('mobileDrawer');
      const toggleBtn = document.querySelector('.menu-toggle');
      const isDrawerOpen = drawer.classList.contains('active');
      if (isDrawerOpen) {
        toggleBtn.setAttribute('aria-expanded', 'false');
        drawer.classList.remove('active');
        document.body.classList.remove('nav-open');
      } else {
        toggleBtn.setAttribute('aria-expanded', 'true');
        drawer.classList.add('active');
        document.body.classList.add('nav-open');
      }
    }
    window.addEventListener('resize', () => { if(window.innerWidth > 768) { document.getElementById('mobileDrawer').classList.remove('active'); document.body.classList.remove('nav-open'); } });

    const vol = document.getElementById('volumeRange'), cov = document.getElementById('coverageRange');
    function calc() {
      const v = parseFloat(vol.value), c = parseFloat(cov.value)/100;
      const t = (v * 0.029) + ((v/75) * 0.30);
      const s = t * c;
      document.getElementById('volumeDisplay').textContent = `$${v.toLocaleString()}`;
      document.getElementById('coverageDisplay').textContent = `${Math.round(c*100)}%`;
      document.getElementById('lossDisplay').textContent = `-$${t.toFixed(2)}`;
      document.getElementById('savedDisplay').textContent = `+$${s.toFixed(2)}`;
      document.getElementById('netDisplay').textContent = `$${(v - (t - s)).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }
    vol.addEventListener('input', calc); cov.addEventListener('input', calc); calc();
  </script>
</body>
</html>
