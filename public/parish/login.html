<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGAPAY Giving Login | AGAPAY</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/parish/style.css" />
  <script src="/parish/app.js" defer></script>
  <link rel="stylesheet" href="/styles/numbers.css" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/app/apple-touch-icon.png" />
  <meta name="theme-color" content="#061522" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="My AGAPAY" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body class="parish-login-simple">
  <main class="parish-auth-page">
    <section class="parish-auth-shell">
      <div class="parish-auth-intro">
        <a href="/" class="auth-home-link" aria-label="AGAPAY home">
          <img src="/mark.png" alt="" />
        </a>
        <div>
          <div class="eyebrow">Welcome back</div>
          <h1>Open your AGAPAY Giving dashboard.</h1>
          <p>Log in to manage your giving page, QR code, funds, campaigns, Stripe setup, and weekly commemorations.</p>
        </div>
      </div>

      <form class="parish-auth-card" id="parishLoginForm" onsubmit="loginFromParishPage(event)">
        <h2>Login</h2>
        <div class="form-group">
          <label class="form-label" for="parishId">Parish ID</label>
          <input id="parishId" autocomplete="off" placeholder="st-seraphim-mission" />
        </div>
        <div class="form-group">
          <label class="form-label" for="parishToken">Password</label>
          <input id="parishToken" type="password" autocomplete="new-password" placeholder="Your parish password" />
        </div>
        <div class="parish-auth-actions">
          <button class="btn btn-gold" type="submit">Log in</button>
          <a class="btn btn-ghost" href="/register.html">Register parish</a>
          <button class="btn btn-ghost" type="button" onclick="showParishPasswordReset()">Forgot password?</button>
        </div>
      </form>

      <form class="parish-auth-card" id="parishResetRequestForm" onsubmit="requestParishPasswordReset(event)" hidden>
        <h2>Reset password</h2>
        <div class="form-group">
          <label class="form-label" for="parishResetId">Parish ID</label>
          <input id="parishResetId" autocomplete="off" placeholder="st-seraphim-mission" />
        </div>
        <div class="form-group">
          <label class="form-label" for="parishResetEmail">Priest or treasurer email</label>
          <input id="parishResetEmail" type="email" autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="parish-auth-actions">
          <button class="btn btn-gold" type="submit">Send reset link</button>
          <button class="btn btn-ghost" type="button" onclick="showParishLogin()">Back to login</button>
        </div>
      </form>

      <form class="parish-auth-card" id="parishResetConfirmForm" onsubmit="confirmParishPasswordReset(event)" hidden>
        <h2>Choose new password</h2>
        <input id="parishResetToken" type="hidden" />
        <div class="form-group">
          <label class="form-label" for="parishResetConfirmId">Parish ID</label>
          <input id="parishResetConfirmId" autocomplete="username" placeholder="st-seraphim-mission" />
        </div>
        <div class="form-group">
          <label class="form-label" for="parishNewPassword">New password</label>
          <input id="parishNewPassword" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
        </div>
        <div class="form-group">
          <label class="form-label" for="parishConfirmPassword">Confirm password</label>
          <input id="parishConfirmPassword" type="password" autocomplete="new-password" placeholder="Re-enter new password" />
        </div>
        <div class="parish-auth-actions">
          <button class="btn btn-gold" type="submit">Update password</button>
          <button class="btn btn-ghost" type="button" onclick="showParishLogin()">Back to login</button>
        </div>
      </form>
    </section>
  </main>

  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
