<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <title>Find an Orthodox Church to Give | AGAPAY</title>
  <meta name="description" content="Search verified Orthodox parishes, missions, and monasteries receiving gifts through AGAPAY Give." />
  <link rel="canonical" href="https://agapay.app/give/find-church" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AGAPAY" />
  <meta property="og:title" content="Find an Orthodox Church to Give | AGAPAY" />
  <meta property="og:description" content="Search verified Orthodox communities and give through AGAPAY." />
  <meta property="og:url" content="https://agapay.app/give/find-church" />
  <meta property="og:image" content="https://agapay.app/images/giving/church-sketch-hero.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Find an Orthodox Church to Give | AGAPAY" />
  <meta name="twitter:description" content="Search verified Orthodox communities and give through AGAPAY." />
  <meta name="twitter:image" content="https://agapay.app/images/giving/church-sketch-hero.png" />
  <meta name="theme-color" content="#061522" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/site-chrome.css" />
  <style>
    :root {
      --night: #061522;
      --blue: #0b2130;
      --cream: #f6f1e8;
      --paper: #fffdf8;
      --ink: #171715;
      --muted: #625d53;
      --line: rgba(166, 159, 145, 0.34);
      --gold: #d6af5b;
      --gold-dark: #a97c25;
      --serif: "Cormorant Garamond", Georgia, serif;
      --sans: "DM Sans", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 5%, rgba(214, 175, 91, 0.16), transparent 28rem),
        linear-gradient(180deg, #fbf7ed 0%, var(--cream) 54%, #fffaf1 100%);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .find-page { min-height: 100vh; overflow: clip; }
    .find-hero {
      position: relative;
      padding: clamp(4.8rem, 8vw, 7.2rem) 1rem clamp(2.6rem, 5vw, 4.2rem);
      border-bottom: 1px solid var(--line);
    }
    .find-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(200, 162, 74, 0.08) 0 1px, transparent 1px) 0 0 / 56px 56px,
        linear-gradient(180deg, rgba(255, 253, 248, 0.72), rgba(255, 253, 248, 0));
      pointer-events: none;
      opacity: 0.74;
    }
    .wrap {
      position: relative;
      width: min(1160px, calc(100% - 2rem));
      margin: 0 auto;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 380px);
      gap: clamp(1.5rem, 4vw, 3rem);
      align-items: center;
    }
    .eyebrow {
      margin: 0 0 0.8rem;
      color: var(--gold-dark);
      font-family: var(--serif);
      font-size: clamp(1.08rem, 2vw, 1.35rem);
      font-style: italic;
      letter-spacing: 0.05em;
    }
    h1 {
      max-width: 780px;
      margin: 0;
      color: var(--night);
      font-family: var(--serif);
      font-size: clamp(3.1rem, 8vw, 6.25rem);
      line-height: 0.92;
      font-weight: 500;
      letter-spacing: 0;
    }
    .hero-copy {
      max-width: 640px;
      margin: 1.2rem 0 0;
      color: var(--muted);
      font-size: clamp(1.04rem, 2vw, 1.2rem);
      line-height: 1.65;
    }
    .hero-art {
      border: 1px solid rgba(214, 175, 91, 0.28);
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.74);
      box-shadow: 0 24px 70px rgba(6, 21, 34, 0.12);
      padding: 1rem;
    }
    .hero-art img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 12px;
      opacity: 0.94;
    }
    .search-section { padding: clamp(2rem, 4vw, 3.4rem) 0 clamp(4rem, 7vw, 6rem); }
    .search-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.85rem;
      align-items: center;
      margin-bottom: 1.3rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 253, 248, 0.78);
      box-shadow: 0 18px 52px rgba(6, 21, 34, 0.08);
    }
    .search-input {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(166, 159, 145, 0.44);
      border-radius: 9px;
      background: #fffaf1;
      color: var(--ink);
      font: 500 1rem var(--sans);
      padding: 0 1rem;
      outline: none;
    }
    .search-input:focus { border-color: rgba(169, 124, 37, 0.72); box-shadow: 0 0 0 3px rgba(214, 175, 91, 0.14); }
    .count {
      color: var(--gold-dark);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.76rem;
      white-space: nowrap;
    }
    .parish-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }
    .parish-card {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 253, 248, 0.86);
      box-shadow: 0 12px 38px rgba(6, 21, 34, 0.08);
    }
    .parish-card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #efe5d2;
    }
    .parish-body { padding: 1rem; }
    .type {
      display: inline-flex;
      width: max-content;
      margin-bottom: 0.7rem;
      border: 1px solid rgba(214, 175, 91, 0.34);
      border-radius: 999px;
      color: var(--gold-dark);
      padding: 0.26rem 0.58rem;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .parish-card h2 {
      margin: 0 0 0.45rem;
      color: var(--night);
      font-family: var(--serif);
      font-size: 1.65rem;
      line-height: 1;
      font-weight: 600;
    }
    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }
    .card-actions {
      display: flex;
      gap: 0.65rem;
      padding: 0 1rem 1rem;
      flex-wrap: wrap;
    }
    .button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      padding: 0 1rem;
      font-weight: 800;
      font-size: 0.9rem;
    }
    .button.primary { background: var(--night); color: var(--cream); }
    .button.secondary { border: 1px solid rgba(169, 124, 37, 0.42); color: var(--night); background: rgba(255, 253, 248, 0.62); }
    .empty {
      grid-column: 1 / -1;
      border: 1px dashed rgba(166, 159, 145, 0.46);
      border-radius: 14px;
      background: rgba(255, 253, 248, 0.58);
      padding: 2rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    @media (max-width: 900px) {
      .hero-grid,
      .search-panel,
      .parish-grid { grid-template-columns: 1fr; }
      .hero-art { max-width: 360px; }
    }
    @media (max-width: 560px) {
      .wrap { width: min(100% - 1rem, 1160px); }
      h1 { font-size: clamp(2.9rem, 15vw, 4.2rem); }
      .find-hero { padding-top: 3.2rem; }
      .card-actions .button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="find-page">
    <section class="find-hero">
      <div class="wrap hero-grid">
        <div>
          <p class="eyebrow">AGAPAY Give</p>
          <h1>Find a church to give.</h1>
          <p class="hero-copy">Search verified Orthodox parishes, missions, and monasteries receiving gifts through AGAPAY. Choose a community, then give directly through its parish giving page.</p>
        </div>
        <div class="hero-art" aria-hidden="true">
          <img src="/images/giving/church-sketch-hero.png" alt="" />
        </div>
      </div>
    </section>

    <section class="search-section" aria-labelledby="findChurchHeading">
      <div class="wrap">
        <div class="search-panel">
          <label>
            <span class="sr-only">Search by church, city, state, or jurisdiction</span>
            <input class="search-input" id="churchSearch" type="search" autocomplete="off" placeholder="Search by church, city, state, or jurisdiction" />
          </label>
          <div class="count" id="churchCount">Loading churches</div>
        </div>
        <div class="parish-grid" id="churchGrid" aria-live="polite">
          <div class="empty">Loading verified Orthodox communities...</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const grid = document.getElementById("churchGrid");
    const search = document.getElementById("churchSearch");
    const count = document.getElementById("churchCount");
    let parishes = [];

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function parishImage(parish) {
      if (parish.imageUrl) return parish.imageUrl;
      if (parish.type === "monastery") return "/images/giving/monastery-square.png";
      if (parish.type === "mission") return "/images/giving/mission-church-square.png";
      return "/images/giving/parish-church-square.png";
    }

    function parishType(parish) {
      const value = parish.type || parish.communityType || "parish";
      return value.replace(/[_-]+/g, " ");
    }

    function locationLine(parish) {
      return [parish.city, parish.state].filter(Boolean).join(", ");
    }

    function matches(parish, query) {
      if (!query) return true;
      return [
        parish.name,
        parish.city,
        parish.state,
        parish.jurisdiction,
        parish.jurisdictionLabel,
        parish.type,
        parish.communityType
      ].filter(Boolean).join(" ").toLowerCase().includes(query);
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const shown = parishes.filter((parish) => matches(parish, query));
      count.textContent = shown.length === 1 ? "1 church" : `${shown.length} churches`;
      if (!shown.length) {
        grid.innerHTML = '<div class="empty">No verified communities match that search yet. Try a city, state, parish name, or jurisdiction.</div>';
        return;
      }
      grid.innerHTML = shown.map((parish) => `
        <article class="parish-card">
          <img src="${escapeHtml(parishImage(parish))}" alt="${escapeHtml(parish.imageAlt || `${parish.name || "Orthodox community"} sketch`)}" loading="lazy" />
          <div class="parish-body">
            <span class="type">${escapeHtml(parishType(parish))}</span>
            <h2>${escapeHtml(parish.name)}</h2>
            <div class="meta">${escapeHtml(parish.jurisdictionLabel || parish.jurisdiction || "Orthodox community")}</div>
            <div class="meta">${escapeHtml(locationLine(parish))}</div>
          </div>
          <div class="card-actions">
            <a class="button primary" href="/give/${encodeURIComponent(parish.id)}">Give to this church</a>
            <a class="button secondary" href="/myagapay/signup?parish=${encodeURIComponent(parish.id)}">Save in My AGAPAY</a>
          </div>
        </article>
      `).join("");
    }

    async function fetchAllParishes() {
      const rows = [];
      let cursor = "";
      do {
        const params = new URLSearchParams({ limit: "250" });
        if (cursor) params.set("cursor", cursor);
        const response = await fetch(`/api/parishes?${params}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Unable to load churches.");
        rows.push(...(data.parishes || []));
        cursor = data.cursor || "";
      } while (cursor);
      return rows;
    }

    search.addEventListener("input", render);

    fetchAllParishes()
      .then((rows) => {
        parishes = rows;
        render();
      })
      .catch((error) => {
        count.textContent = "Unable to load";
        grid.innerHTML = `<div class="empty">${escapeHtml(error.message || "Unable to load churches right now.")}</div>`;
      });
  </script>
  <script src="/site-chrome.js" defer></script>
</body>
</html>
