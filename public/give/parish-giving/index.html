<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parish Campaign | AGAPAY</title>
  <meta name="description" content="Support this Orthodox parish campaign through AGAPAY." />
  <meta property="og:type" content="website" /><meta property="og:site_name" content="AGAPAY" />
  <meta property="og:title" content="Parish Campaign | AGAPAY" />
  <meta property="og:description" content="Support this Orthodox parish campaign through AGAPAY." />
  <meta property="og:image" content="https://agapay.app/images/og-default.png" />
  <meta property="og:url" content="https://agapay.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Parish Campaign | AGAPAY" />
  <meta name="twitter:description" content="Support this Orthodox parish campaign through AGAPAY." />
  <meta name="twitter:image" content="https://agapay.app/images/og-default.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.webmanifest" /><meta name="theme-color" content="#061522" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--deep:#061522;--deep-2:#0B2130;--gold:#C8A24A;--gold-soft:rgba(200,162,74,0.15);--cream:#F6F1E8;--paper:#FDFBF7;--stone:#6F6A60;--muted:#9A9488;--ink:#171715;--line:rgba(111,106,96,0.18);--serif:"Cormorant Garamond",Georgia,serif;--sans:"DM Sans",system-ui,sans-serif;--shadow:0 8px 32px rgba(6,21,34,0.10)}
    html{scroll-behavior:smooth}body{min-height:100vh;background:var(--cream);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}img{display:block;max-width:100%}[hidden]{display:none!important}
    .topbar{position:sticky;top:0;z-index:100;background:var(--deep);border-bottom:1px solid rgba(200,162,74,0.18);display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.5rem}
    .topbar-brand{display:flex;align-items:center;gap:10px;color:var(--cream);font-family:var(--serif);font-size:1.25rem;font-weight:600;letter-spacing:0.04em}
    .topbar-brand svg{width:28px;height:28px}
    .topbar-give{background:var(--gold);color:var(--deep);font-weight:700;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:6px;border:none;cursor:pointer;transition:opacity 0.15s;text-decoration:none;display:inline-block}
    .topbar-give:hover{opacity:0.88}
    .hero{position:relative;width:100%;height:min(62vw,480px);background:var(--deep-2);overflow:hidden}
    .hero-img{width:100%;height:100%;object-fit:cover}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,21,34,0.72) 0%,rgba(6,21,34,0.18) 55%,transparent 100%)}
    .hero-badge{position:absolute;top:1.25rem;left:1.5rem;background:rgba(6,21,34,0.72);border:1px solid rgba(200,162,74,0.35);color:var(--gold);font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.3rem 0.75rem;border-radius:100px;backdrop-filter:blur(8px)}
    .hero-skeleton{width:100%;height:100%;background:linear-gradient(90deg,#0B2130 25%,#0f2c40 50%,#0B2130 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
    @media(max-width:820px){.page{grid-template-columns:1fr}.sidebar-col{order:-1}}
    .parish-kicker{display:flex;align-items:center;gap:10px;margin-bottom:0.6rem}
    .parish-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-soft);background:var(--deep-2)}
    .parish-name{font-size:0.825rem;font-weight:600;color:var(--stone);letter-spacing:0.03em}
    .campaign-title{font-family:var(--serif);font-size:clamp(1.9rem,4vw,2.75rem);font-weight:600;line-height:1.18;color:var(--ink);margin-bottom:1rem}
    .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.3rem 0.8rem;border-radius:100px;margin-bottom:1.5rem}
    .status-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
    .status-active{color:#2a7a4b;background:rgba(42,122,75,0.1)}.status-completed{color:var(--stone);background:rgba(111,106,96,0.12)}.status-paused{color:#9a6c1a;background:rgba(154,108,26,0.1)}
    .campaign-description{font-size:1rem;line-height:1.72;color:#3a3830;white-space:pre-wrap;margin-bottom:2rem}
    .photo-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:2rem}
    .photo-gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;cursor:pointer;transition:opacity 0.15s}.photo-gallery img:hover{opacity:0.88}
    .updates-section{margin-bottom:2rem}
    .section-heading{font-family:var(--serif);font-size:1.35rem;font-weight:600;color:var(--ink);margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--line)}
    .update-item{display:grid;grid-template-columns:3px 1fr;gap:0 1.25rem;margin-bottom:1.5rem}
    .update-line{background:linear-gradient(to bottom,var(--gold),transparent);border-radius:2px}
    .update-date{font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);margin-bottom:0.35rem}
    .update-body{font-size:0.9375rem;line-height:1.65;color:#3a3830;white-space:pre-wrap}
    .sidebar-col{position:sticky;top:80px}
    .progress-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1rem}
    .thermo-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.75rem}
    .thermo-raised{font-family:var(--serif);font-size:2.2rem;font-weight:600;color:var(--ink);line-height:1}
    .thermo-goal{font-size:0.8rem;color:var(--stone);font-weight:500}
    .thermo-track{width:100%;height:14px;background:rgba(200,162,74,0.12);border-radius:100px;overflow:hidden;margin-bottom:0.6rem}
    .thermo-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#C8A24A,#e8c56a);transition:width 1.2s cubic-bezier(0.4,0,0.2,1);position:relative}
    .thermo-fill::after{content:"";position:absolute;right:0;top:0;bottom:0;width:6px;background:rgba(255,255,255,0.45);border-radius:100px;filter:blur(2px)}
    .thermo-meta{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--stone)}.thermo-pct{font-weight:700;color:var(--gold)}
    .give-btn{display:block;width:100%;background:var(--gold);color:var(--deep);font-weight:700;font-size:1rem;padding:0.9rem 1rem;border-radius:8px;border:none;cursor:pointer;text-align:center;margin-top:1.25rem;transition:opacity 0.15s,transform 0.1s;text-decoration:none}
    .give-btn:hover{opacity:0.88;transform:translateY(-1px)}.give-btn:active{transform:translateY(0)}
    .deadline-note{text-align:center;font-size:0.78rem;color:var(--stone);margin-top:0.75rem}
    .share-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:1.25rem 1.5rem}
    .share-label{font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--stone);margin-bottom:0.9rem}
    .share-buttons{display:flex;gap:8px;flex-wrap:wrap}
    .share-btn{display:inline-flex;align-items:center;gap:7px;padding:0.5rem 0.9rem;border-radius:7px;border:1px solid var(--line);font-size:0.8rem;font-weight:600;cursor:pointer;background:var(--paper);color:var(--ink);transition:background 0.15s,border-color 0.15s;text-decoration:none}
    .share-btn:hover{background:var(--cream);border-color:var(--gold)}.share-btn svg{width:16px;height:16px;flex-shrink:0}.share-btn.copied{color:#2a7a4b;border-color:#2a7a4b}
    .lightbox{position:fixed;inset:0;background:rgba(6,21,34,0.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;cursor:zoom-out}
    .lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;box-shadow:0 24px 72px rgba(0,0,0,0.5)}
    .lightbox-close{position:absolute;top:1.25rem;right:1.5rem;color:rgba(246,241,232,0.7);font-size:1.75rem;cursor:pointer}
    .page-footer{text-align:center;padding:2rem 1rem 3rem;font-size:0.78rem;color:var(--muted);border-top:1px solid var(--line)}
    .page-footer a{color:var(--gold)}
    .skel{background:linear-gradient(90deg,#e8e3d8 25%,#f0ebe0 50%,#e8e3d8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    .skel-text{height:1em;margin-bottom:0.5em}.skel-title{height:2.5rem;width:70%;margin-bottom:1rem}
    .error-state{text-align:center;padding:4rem 2rem;color:var(--stone)}
    .error-state h2{font-family:var(--serif);font-size:1.5rem;margin-bottom:0.5rem;color:var(--ink)}.error-state p{font-size:0.9rem;line-height:1.6}
  </style>
</head>
<body>
  <header class="topbar">
    <a href="/" class="topbar-brand" aria-label="AGAPAY home">
      <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" stroke="#C8A24A" stroke-width="1.5"/><path d="M20 10 L20 30 M14 16 L26 16 M13 22 L27 22" stroke="#C8A24A" stroke-width="1.8" stroke-linecap="round"/></svg>
      AGAPAY
    </a>
    <a href="#" class="topbar-give" id="topbarGiveBtn">Give Now</a>
  </header>
  <div class="hero">
    <div class="hero-skeleton" id="heroSkeleton"></div>
    <img class="hero-img" id="heroImg" src="" alt="" hidden />
    <div class="hero-overlay" id="heroOverlay" hidden></div>
    <span class="hero-badge" id="heroBadge" hidden></span>
  </div>
  <main class="page">
    <div class="main-col">
      <div id="loadingState">
        <div class="skel skel-title"></div>
        <div class="skel skel-text" style="width:90%"></div>
        <div class="skel skel-text" style="width:75%"></div>
        <div class="skel skel-text" style="width:60%"></div>
      </div>
      <div id="campaignContent" hidden>
        <div class="parish-kicker">
          <img class="parish-avatar" id="parishAvatar" src="" alt="" />
          <span class="parish-name" id="parishNameLabel"></span>
        </div>
        <h1 class="campaign-title" id="campaignTitle"></h1>
        <span class="status-badge" id="statusBadge" hidden></span>
        <p class="campaign-description" id="campaignDescription"></p>
        <div class="photo-gallery" id="photoGallery"></div>
        <div class="updates-section" id="updatesSection" hidden>
          <h2 class="section-heading">Updates</h2>
          <div id="updatesList"></div>
        </div>
      </div>
      <div id="errorState" class="error-state" hidden>
        <h2>Campaign not found</h2>
        <p>This link may be outdated or the campaign may have ended.<br><a href="/" style="color:var(--gold)">Return to AGAPAY</a></p>
      </div>
    </div>
    <aside class="sidebar-col">
      <div class="progress-card">
        <div class="thermo-amounts">
          <span class="thermo-raised" id="thermoRaised">—</span>
          <span class="thermo-goal" id="thermoGoal"></span>
        </div>
        <div class="thermo-track"><div class="thermo-fill" id="thermoFill" style="width:0%"></div></div>
        <div class="thermo-meta">
          <span id="thermoGiftCount"></span>
          <span class="thermo-pct" id="thermoPct"></span>
        </div>
        <a href="#" class="give-btn" id="giveBtn">Give to This Campaign</a>
        <p class="deadline-note" id="deadlineNote" hidden></p>
      </div>
      <div class="share-card">
        <p class="share-label">Share this campaign</p>
        <div class="share-buttons">
          <a href="#" class="share-btn" id="shareFacebook" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>Facebook
          </a>
          <a href="#" class="share-btn" id="shareTwitter" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>X / Twitter
          </a>
          <button class="share-btn" id="shareCopy" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy link
          </button>
        </div>
      </div>
    </aside>
  </main>
  <div class="lightbox" id="lightbox" hidden>
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="" />
  </div>
  <footer class="page-footer">
    <p>Powered by <a href="https://agapay.app">AGAPAY</a> &mdash; Orthodox Christian giving</p>
  </footer>
  <script src="/give/parish-giving/app.js" defer></script>
</body>
</html>
