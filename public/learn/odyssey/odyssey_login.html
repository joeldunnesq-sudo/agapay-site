<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGAPAY Learn | Odyssey Portal Login</title>
  <meta name="theme-color" content="#061522" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/donor/style.css?v=20260702b" />
  <style>
    /* TEFA-specific overrides */
    .odyssey-login-badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .35rem .75rem;
      border-radius: 999px;
      border: 1px solid rgba(200,162,74,.4);
      background: rgba(200,162,74,.1);
      color: var(--gold);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .75rem;
    }
    .odyssey-login-badge svg { width: 14px; height: 14px; }
    .odyssey-login-note {
      margin-top: .75rem;
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .odyssey-login-note a { color: var(--gold); }
    .odyssey-activate-link {
      display: block;
      margin-top: 1.25rem;
      padding: .85rem;
      border: 1px dashed rgba(200,162,74,.35);
      border-radius: 10px;
      background: rgba(200,162,74,.05);
      text-align: center;
      text-decoration: none;
      color: var(--ink);
    }
    .odyssey-activate-link strong { display: block; color: var(--gold); font-size: .82rem; margin-bottom: .2rem; }
    .odyssey-activate-link span { font-size: .75rem; color: var(--muted); }
  </style>
</head>
<body class="donor-login-simple">
  <main class="donor-auth-page">
    <section class="donor-auth-shell">
      <div class="notice" id="odysseyLoginStatus" style="display:none;"></div>

      <div class="donor-auth-intro">
        <a href="/learn/odyssey" class="auth-home-link" aria-label="AGAPAY Learn home">
          <img src="/mark.png" alt="" />
        </a>
        <div>
          <div class="odyssey-login-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 5.5A3.5 3.5 0 0 1 7.5 2H20v17H7.5A3.5 3.5 0 0 0 4 22z"/>
            </svg>
            Odyssey Homeschool Portal
          </div>
          <h1>Sign in to AGAPAY Learn.</h1>
          <p>Your homeschool curriculum planner, accessible with your AGAPAY account.</p>
        </div>
      </div>

      <div class="donor-auth-form-card">
        <form id="odysseyLoginForm" autocomplete="on" novalidate>
          <div class="donor-field">
            <label for="odysseyEmail">Email</label>
            <input id="odysseyEmail" name="email" type="email" autocomplete="email"
              inputmode="email" placeholder="your@email.com" required />
          </div>
          <div class="donor-field">
            <label for="odysseyPassword">Password</label>
            <input id="odysseyPassword" name="password" type="password"
              autocomplete="current-password" placeholder="Your password" required />
          </div>
          <button class="btn btn-gold btn-full" type="submit" id="odysseyLoginBtn">Sign in</button>
        </form>

        <p class="odyssey-login-note">
          New to AGAPAY? <a href="/myagapay/signup?next=/learn/odyssey/dashboard/activate">Create a free account</a>, then activate your TEFA subscription.
        </p>

        <a class="odyssey-activate-link" href="/learn/odyssey/dashboard/activate">
          <strong>Activate a new TEFA subscription</strong>
          <span>Have your Odyssey purchase reference ready</span>
        </a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      // Simple session check — reuse the same localStorage keys as My AGAPAY
      const EMAIL_KEY = "agapayDonorEmail";
      const TOKEN_KEY = "agapayDonorToken";

      function session() {
        return {
          email: localStorage.getItem(EMAIL_KEY) || "",
          token: localStorage.getItem(TOKEN_KEY) || ""
        };
      }

      // If already signed in and has learn access, go straight to dashboard
      const current = session();
      if (current.email && current.token) {
        const plan = localStorage.getItem("agapay.learn.plan");
        if (plan === "family") {
          window.location.replace("/learn/odyssey/dashboard");
        }
      }

      const form   = document.getElementById("odysseyLoginForm");
      const status = document.getElementById("odysseyLoginStatus");
      const btn    = document.getElementById("odysseyLoginBtn");

      function showStatus(msg, type) {
        status.textContent = msg;
        status.className   = "notice " + (type === "error" ? "notice-error" : "notice-success");
        status.style.display = "block";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email    = document.getElementById("odysseyEmail").value.trim().toLowerCase();
        const password = document.getElementById("odysseyPassword").value;
        if (!email || !password) { showStatus("Please enter your email and password.", "error"); return; }

        btn.disabled = true;
        btn.textContent = "Signing in…";
        status.style.display = "none";

        try {
          const res  = await fetch("/api/donor/login", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ email, password })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.token) throw new Error(data.error || "Sign in failed.");

          localStorage.setItem(EMAIL_KEY, email);
          localStorage.setItem(TOKEN_KEY, data.token);

          // Check if they have a TEFA learn plan
          const billingRes  = await fetch("/api/learn/billing/status", {
            headers: { "Authorization": "Bearer " + data.token, "X-AGAPAY-Donor-Email": email }
          });
          const billingData = await billingRes.json().catch(() => ({}));

          if (billingData.plan === "family") {
            localStorage.setItem("agapay.learn.plan", "family");
            const next = new URLSearchParams(window.location.search).get("next") || "/learn/odyssey/dashboard";
            window.location.replace(next);
          } else {
            // Signed in but no active Learn plan — send to activate
            showStatus("Your account doesn't have an active AGAPAY Learn subscription. Please activate your TEFA plan.", "error");
            btn.disabled = false;
            btn.textContent = "Sign in";
          }
        } catch (err) {
          showStatus(err.message || "Sign in failed. Please try again.", "error");
          btn.disabled = false;
          btn.textContent = "Sign in";
        }
      });
    })();
  </script>
</body>
</html>
