    // Odyssey context: default the Church card to minimized on first visit,
    // so non-Orthodox TEFA families aren't greeted with liturgical content.
    // The user can expand it and their choice persists via localStorage.

      var key = "agapay.learn.churchCardMinimized";
      if (localStorage.getItem(key) === null) {
        localStorage.setItem(key, "true");
      }
